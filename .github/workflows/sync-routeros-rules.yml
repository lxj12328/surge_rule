name: Auto Update and Clean RouterOS Ads Rule

on:
  schedule:
    # 每天 UTC 时间凌晨 2:00 运行 (北京时间上午 10:00)
    - cron: '0 2 * * *'
  # 允许在 GitHub 网页端手动点击运行
  workflow_dispatch:

jobs:
  update-rules:
    runs-on: ubuntu-latest
    permissions:
      # 赋予写权限，允许 bot 提交代码到你的仓库
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download and Process Ads Rule
        run: |
          echo "开始下载最新的 RouterOS 规则文件..."
          # 下载源文件到临时文件
          curl -sL "https://raw.githubusercontent.com/TG-Twilight/AWAvenue-Ads-Rule/main/Filters/AWAvenue-Ads-Rule-RouterOS.txt" -o temp_rules.txt
          
          echo "生成最终规则文件..."
          # 1. 在文件最开头写入 RouterOS 的批量删除命令 (使用单个 > 覆盖或创建新文件)
          echo '/ip dns static remove [find address="240.0.0.1"]' > AWAvenue-Ads-Rule-RouterOS.txt
          echo '/ip dns static remove [find address="::"]' >> AWAvenue-Ads-Rule-RouterOS.txt
          
          # 2. 提取以 'ip dns static add' 开头的实际规则，并追加到删除命令下方 (使用 >> 追加)
          sed -n '/^ip dns static add/,$p' temp_rules.txt >> AWAvenue-Ads-Rule-RouterOS.txt
          
          # 3. 删除临时文件
          rm temp_rules.txt

      - name: Commit and Push changes
        run: |
          # 配置 git bot 身份
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          
          # 检查文件是否有更新，如果有则提交并推送
          if [ -n "$(git status --porcelain)" ]; then
            git add AWAvenue-Ads-Rule-RouterOS.txt
            git commit -m "Auto-update RouterOS rules [$(date +'%Y-%m-%d')]"
            git push
            echo "✅ 规则已更新并推送成功！"
          else
            echo "ℹ️ 源文件未发生变化，无需更新。"
          fi
